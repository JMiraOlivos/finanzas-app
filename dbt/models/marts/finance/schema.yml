version: 2

models:
  - name: fct_pnl_monthly
    description: >
      Montos P&L mensuales por empresa y línea de detalle.
      Equivalente a v_pnl_base_monthly pero filtrado a cargas procesadas.
      Subtotales y líneas calculadas (EBITDA, Resultado) se derivan en query time.
    columns:
      - name: company_id
        tests: [not_null]
      - name: pnl_line_code
        tests: [not_null]
      - name: period_month
        tests: [not_null]
      - name: amount
        description: "Suma de mapped_amount para la línea de detalle. Ingresos > 0, gastos < 0."

  - name: fct_scenario_monthly
    description: >
      Real, presupuesto y forecast por (empresa, período, línea PnL) con metadata de línea.
      Base para vistas de varianza en dashboard y EERR vs presupuesto.
    columns:
      - name: company_id
        tests: [not_null]
      - name: pnl_line_code
        tests: [not_null]
      - name: period_month
        tests: [not_null]
      - name: scenario
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['actual', 'budget', 'forecast']

  - name: fct_dashboard_kpis
    description: >
      KPIs YTD del dashboard ejecutivo por (empresa, período).
      Incluye real, año anterior y presupuesto para cálculo de varianzas.
      El API suma empresas permitidas y deriva ratios (márgenes, vs_prior, vs_budget).
    columns:
      - name: company_id
        tests: [not_null]
      - name: period_month
        tests: [not_null]
      - name: revenue_ytd
        description: "Ingresos acumulados YTD (scenario actual)."

  - name: fct_pnl_ytd_comparison
    description: >
      YTD acumulado por (empresa, línea de detalle, período): real actual, año anterior y presupuesto.
      Usa window functions sobre fct_pnl_monthly y stg_budget_monthly.
      Subtotales y líneas calculadas se derivan en query time por fn_pnl_ytd_comparison.
    columns:
      - name: company_id
        tests: [not_null]
      - name: pnl_line_code
        tests: [not_null]
      - name: period_month
        tests: [not_null]
      - name: actual_ytd
        description: "YTD acumulado del año en curso (real)."
      - name: ly_ytd
        description: "YTD acumulado del mismo período del año anterior."
      - name: budget_ytd
        description: "YTD acumulado del presupuesto activo del año en curso."

  - name: fct_variance_drivers
    description: >
      Varianzas vs año anterior y vs presupuesto agrupadas al nivel de línea P&L padre
      (RRHH, MARKETING, INGRESOS, etc.) por empresa y período.
      Base para el panel de drivers del dashboard.
    columns:
      - name: company_id
        tests: [not_null]
      - name: pnl_line_code
        tests: [not_null]
      - name: period_month
        tests: [not_null]

  - name: fct_company_bullet_kpis
    description: >
      KPIs de cumplimiento por empresa para bullet charts: real YTD vs presupuesto y año anterior.
      Dos filas por (company, period): REVENUE_YTD y EBITDA_YTD.
      El status de EBITDA maneja targets negativos correctamente.
    columns:
      - name: company_id
        tests: [not_null]
      - name: period_month
        tests: [not_null]
      - name: metric_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['REVENUE_YTD', 'EBITDA_YTD']
      - name: actual_ytd
        description: "Monto real YTD para la métrica."
      - name: target_ytd
        description: "Presupuesto YTD activo. Null si no hay presupuesto cargado."
      - name: attainment_pct
        description: "actual_ytd / target_ytd. Null si target es null o 0."
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['red', 'yellow', 'green', 'blue', 'gray']

  - name: dq_financial_control
    description: >
      Control de calidad por carga procesada: semáforo green/yellow/red,
      desbalance debe/haber, cuentas sin mapear y cargas atascadas.
    columns:
      - name: file_id
        tests: [unique, not_null]
      - name: company_id
        tests: [not_null]
      - name: period_month
        tests: [not_null]
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['green', 'yellow', 'red']
