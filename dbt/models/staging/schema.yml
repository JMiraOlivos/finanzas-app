version: 2

models:
  - name: stg_companies
    description: "Empresas E&V activas e inactivas"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: name
        tests: [unique, not_null]

  - name: stg_uploaded_files
    description: "Historial de cargas. superseded_by indica qué carga reemplazó a esta"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: company_id
        tests: [not_null]
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['uploaded', 'processing', 'processed', 'failed', 'replaced']

  - name: stg_journal_entries
    description: "Movimientos contables — todos los períodos y estados"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: company_id
        tests: [not_null]
      - name: period_month
        tests: [not_null]

  - name: stg_pnl_lines
    description: "Jerarquía completa del Estado de Resultados"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: code
        tests: [unique, not_null]

  - name: stg_account_pnl_mappings
    description: "Mapeo cuenta → línea PnL. company_id NULL = mapeo global"
    columns:
      - name: id
        tests: [unique, not_null]

  - name: stg_budget_monthly
    description: "Montos de presupuesto con metadata de versión (year, is_active)"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: company_id
        tests: [not_null]
      - name: period_month
        tests: [not_null]

  - name: stg_forecast_monthly
    description: "Montos de forecast con metadata de versión (year, is_active)"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: company_id
        tests: [not_null]
      - name: period_month
        tests: [not_null]

  - name: stg_pnl_formula_components
    description: "Componentes de fórmulas: qué líneas suma cada cálculo (EBITDA, RESULTADO_FINAL, etc.)"
    columns:
      - name: formula_key
        tests: [not_null]
      - name: component_line_code
        tests: [not_null]

  # ── PR 2: staging de tablas versionadas (P&L Builder) ─────────────────────

  - name: stg_pnl_structure_versions
    description: "Todas las versiones de estructura P&L (draft, published, archived)"
    columns:
      - name: id
        tests: [unique, not_null]
      - name: name
        tests: [not_null]
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['draft', 'published', 'archived']
      - name: is_active
        tests: [not_null]

  - name: stg_active_pnl_lines
    description: "Líneas P&L de la versión activa publicada. Equivalente versionado de stg_pnl_lines."
    columns:
      - name: id
        tests: [unique, not_null]
      - name: structure_version_id
        tests: [not_null]
      - name: code
        tests: [unique, not_null]
      - name: line_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['detail', 'subtotal', 'calculated']

  - name: stg_active_account_pnl_mappings
    description: "Mappings cuenta → pnl_line_code de la versión activa. company_id NULL = global."
    columns:
      - name: id
        tests: [unique, not_null]
      - name: structure_version_id
        tests: [not_null]
      - name: account_code
        tests: [not_null]
      - name: pnl_line_code
        tests: [not_null]
      - name: sign_multiplier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, -1]

  - name: stg_active_pnl_formula_components
    description: "Componentes de fórmulas de la versión activa. operator es INTEGER (1/-1)."
    columns:
      - name: structure_version_id
        tests: [not_null]
      - name: formula_key
        tests: [not_null]
      - name: component_line_code
        tests: [not_null]
      - name: operator
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, -1]
